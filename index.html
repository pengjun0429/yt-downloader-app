<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Downloader</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="background-blobs">
        <div class="blob"></div><div class="blob"></div>
    </div>

    <div class="container">
        <div id="error-card" class="glass-card" style="display:none; border: 1px solid rgba(255, 80, 80, 0.5);">
            <h2 style="color: #ff5050; margin-bottom: 15px;">系統錯誤</h2>
            <p id="error-msg" style="margin-bottom: 20px;"></p>
            <button class="btn-primary" onclick="switchCard('download-card')">返回首頁</button>
        </div>

        <div id="download-card" class="glass-card">
            <h1>YouTube 下載</h1>
            <p id="user-status">身分：訪客 (剩餘 <span id="quota-count">10</span> 次)</p>
            <input type="text" id="yt-url" placeholder="貼上 YouTube 網址...">
            <button class="btn-primary" onclick="startDownload()">開始下載</button>
            <div id="auth-hint" class="footer-text">
                登入獲取 20 次機會 <span onclick="switchCard('login-card')">點此登入</span>
            </div>
            <button id="logout-btn" class="btn-outline" style="display:none;" onclick="logout()">登出</button>
        </div>

        <div id="login-card" class="glass-card" style="display:none;">
            <h1>會員登入</h1>
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-pass" placeholder="密碼">
            <button class="btn-primary" onclick="handleLogin()">登入</button>
            <div class="divider"><span>或</span></div>
            <div id="g_id_onload" data-client_id="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" data-callback="handleCredentialResponse"></div>
            <div class="g_id_signin" data-type="standard"></div>
            <p class="footer-text" onclick="switchCard('register-card')">註冊帳號</p>
            <p class="footer-text" onclick="switchCard('download-card')">返回</p>
        </div>

        <div id="register-card" class="glass-card" style="display:none;">
            <h1>快速註冊</h1>
            <div style="display:flex; gap:5px;">
                <input type="email" id="reg-email" placeholder="Email">
                <button class="btn-small" onclick="sendOTP()">發送</button>
            </div>
            <input type="text" id="reg-otp" placeholder="驗證碼">
            <input type="password" id="reg-pass" placeholder="密碼">
            <button class="btn-primary" onclick="handleRegister()">完成註冊</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
