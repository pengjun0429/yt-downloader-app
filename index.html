<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Downloader - 玻璃擬態版</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    <div class="background-blobs">
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <div class="container">
        <div id="download-card" class="glass-card">
            <h1>YouTube 下載</h1>
            <p id="user-status">身分：訪客 (剩餘 <span id="quota-count">10</span> 次)</p>
            <div class="input-group">
                <input type="text" id="yt-url" placeholder="請貼上 YouTube 影片網址...">
            </div>
            <button class="btn-primary" onclick="startDownload()">立即解析並下載</button>
            
            <div id="auth-hint" class="footer-text">
                想獲得每日 20 次機會？ <span onclick="switchCard('login-card')">立即登入/註冊</span>
            </div>
            <button id="logout-btn" class="btn-outline" style="display:none;" onclick="logout()">登出帳號</button>
        </div>

        <div id="login-card" class="glass-card" style="display: none;">
            <h1>會員登入</h1>
            <div class="input-group">
                <input type="email" id="login-email" placeholder="電子郵件">
                <input type="password" id="login-pass" placeholder="密碼">
            </div>
            <button class="btn-primary" onclick="handleLogin()">登入</button>
            <div class="divider"><span>或</span></div>
            <div id="g_id_onload"
                 data-client_id="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.apps.googleusercontent.com"
                 data-callback="handleCredentialResponse"
                 data-itp_support="true">
            </div>
            <div class="g_id_signin" data-type="standard"></div>
            <p class="footer-text">沒有帳號？ <span onclick="switchCard('register-card')">註冊新會員</span></p>
            <p class="footer-text" onclick="switchCard('download-card')">返回下載</p>
        </div>

        <div id="register-card" class="glass-card" style="display: none;">
            <h1>註冊會員</h1>
            <div class="input-group">
                <div class="verify-row">
                    <input type="email" id="reg-email" placeholder="電子郵件">
                    <button class="btn-small" onclick="sendOTP()">傳送驗證碼</button>
                </div>
                <input type="text" id="reg-otp" placeholder="輸入 6 位驗證碼">
                <input type="password" id="reg-pass" placeholder="設定密碼">
            </div>
            <button class="btn-primary" onclick="handleRegister()">完成並自動登入</button>
            <p class="footer-text" onclick="switchCard('login-card')">已有帳號？返回登入</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
